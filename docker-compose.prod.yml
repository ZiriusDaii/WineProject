services:
  postgres:
    image: postgres:15-alpine
    container_name: winespa_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-winespa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d winespa"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  backend:
    build: ./backend
    container_name: winespa_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://150.136.219.252}
      NODE_ENV: production
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WABA_ID: ${WHATSAPP_WABA_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_TEST_NUMBER: ${WHATSAPP_TEST_NUMBER}
      MOCK_WHATSAPP: ${MOCK_WHATSAPP:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://150.136.219.252}
    volumes:
      - backend_uploads:/app/uploads

  frontend-web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://150.136.219.252}
    container_name: winespa_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_uploads:
