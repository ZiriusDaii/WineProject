services:
  postgres:
    image: postgres:15-alpine
    container_name: winespa_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: winespa_password_2026
      POSTGRES_DB: winespa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: winespa_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:winespa_password_2026@postgres:5432/winespa
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  postgres_data:
  backend_uploads: