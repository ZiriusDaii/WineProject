version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: winespa_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: winespa_password_2026
      POSTGRES_DB: winespa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: