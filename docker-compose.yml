services:
  postgres:
    image: postgres:15-alpine
    container_name: winespa_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-winespa_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-winespa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: winespa_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:winespa_password_2026@postgres:5432/winespa}
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-winespa-jwt-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WABA_ID: ${WHATSAPP_WABA_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_TEST_NUMBER: ${WHATSAPP_TEST_NUMBER}
      MOCK_WHATSAPP: ${MOCK_WHATSAPP:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  postgres_data:
  backend_uploads:
